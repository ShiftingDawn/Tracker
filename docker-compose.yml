name: tracker
services:
  database:
    image: postgres
    restart: unless-stopped
    ports:
      - 5432:5432
    environment: 
      POSTGRES_USER: root
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: local
    volumes:
      - pgdata:/var/lib/postgresql/data
  redis:
    image: redis
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "100"]
    ports:
      - 6379:6379
    volumes:
      - redisdata:/data
volumes:
  pgdata:
  redisdata: